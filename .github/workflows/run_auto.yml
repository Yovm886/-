name: 自动定时打卡运行

on:
  schedule:
    - cron: '21 13 * * *'  # 北京时间 每晚 21:21 自动运行
  # 保留手动一键测试运行
  workflow_dispatch:

jobs:
  run-task:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装运行所需依赖
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: 执行打卡脚本
        run: python main.py
